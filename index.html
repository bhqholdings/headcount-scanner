<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'Russo One', sans-serif;
    background: #0a0a0a; 
    color: #ffffff; 
    padding: 16px;
    min-height: 100vh;
  }
  .scanner-title {
    text-align: center;
    font-size: 22px;
    color: #CC0000;
    text-shadow: 0 0 10px rgba(204,0,0,0.5);
    margin-bottom: 20px;
    letter-spacing: 2px;
  }
  .camera-area {
    width: 100%;
    aspect-ratio: 1;
    background: #1a1a1a;
    border: 2px dashed #CC0000;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    overflow: hidden;
    position: relative;
  }
  .camera-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 14px;
  }
  .camera-placeholder {
    text-align: center;
    color: #666;
  }
  .camera-placeholder .icon {
    font-size: 48px;
    margin-bottom: 8px;
  }
  .camera-placeholder p {
    font-size: 14px;
  }
  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    margin-bottom: 10px;
    font-family: 'Russo One', sans-serif;
  }
  .btn-camera {
    background: #CC0000;
    color: white;
  }
  .btn-scan {
    background: #ffffff;
    color: #CC0000;
  }
  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .status {
    text-align: center;
    font-size: 14px;
    color: #999;
    margin: 10px 0;
    min-height: 20px;
  }
  .status.loading { color: #CC0000; }
  .status.success { color: #00CC66; }
  .status.error { color: #ff4444; }
  .detected-labels {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 16px;
    display: none;
  }
  .detected-labels h3 {
    font-size: 13px;
    color: #CC0000;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .label-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .label-tag {
    background: #2a2a2a;
    color: #ccc;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    border: 1px solid #444;
  }
  .results-section { display: none; }
  .results-title {
    font-size: 16px;
    color: #CC0000;
    margin-bottom: 12px;
    text-shadow: 0 0 8px rgba(204,0,0,0.4);
  }
  .result-card {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 10px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .result-card img {
    width: 70px;
    height: 70px;
    object-fit: contain;
    border-radius: 8px;
    background: #222;
    flex-shrink: 0;
  }
  .result-info h4 {
    font-size: 15px;
    color: #ffffff;
    margin-bottom: 4px;
  }
  .result-info p {
    font-size: 12px;
    color: #999;
    line-height: 1.4;
  }
  .result-info .team {
    color: #CC0000;
    font-weight: 800;
    font-size: 13px;
  }
  .result-card {
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .result-card:hover, .result-card:active {
    transform: scale(1.02);
    border-color: #CC0000;
  }
  .result-card .tap-hint {
    font-size: 11px;
    color: #CC0000;
    margin-top: 6px;
    font-weight: 800;
  }
  .no-results {
    text-align: center;
    color: #666;
    padding: 20px;
    font-size: 14px;
  }
  .hidden { display: none; }
  #fileInput { display: none; }
</style>
</head>
<body>

<p class="scanner-title">📸 SCAN A BOBBLE</p>

<div class="camera-area" id="cameraArea">
  <div class="camera-placeholder" id="placeholder">
    <div class="icon">🎯</div>
    <p>Tap below to scan<br>your bobblehead</p>
  </div>
  <img id="previewImg" class="hidden" alt="Bobblehead preview">
</div>

<input type="file" id="fileInput" accept="image/*">

<button class="btn btn-camera" onclick="document.getElementById('fileInput').click()">
  📷 Take Photo / Upload
</button>
<button class="btn btn-camera" style="background:#880000;margin-top:-5px;" onclick="openCamera()">
  📸 Use Camera
</button>
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">

<button class="btn btn-scan" id="scanBtn" disabled onclick="scanImage()">
  🔍 Identify Bobblehead
</button>

<div class="status" id="status"></div>

<div class="detected-labels" id="detectedLabels">
  <h3>🔎 Detected</h3>
  <div class="label-tags" id="labelTags"></div>
</div>

<div class="results-section" id="resultsSection">
  <p class="results-title">⚾ Matching Bobbleheads</p>
  <div id="resultsList"></div>
</div>

<script>
  const VISION_API_KEY = "YOUR_VISION_API_KEY_HERE";
  const SHEETS_ID = "YOUR_SHEETS_ID_HERE";
  const SHEET_NAME = "Master List";

  let base64Image = '';

  function openCamera() {
    document.getElementById('cameraInput').click();
  }

  function handleImageFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(event) {
      const result = event.target.result;
      base64Image = result.split(',')[1];
      const img = document.getElementById('previewImg');
      img.src = result;
      img.classList.remove('hidden');
      document.getElementById('placeholder').classList.add('hidden');
      document.getElementById('scanBtn').disabled = false;
      document.getElementById('status').textContent = 'Photo ready — tap Identify!';
      document.getElementById('status').className = 'status success';
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('fileInput').addEventListener('change', function(e) {
    handleImageFile(e.target.files[0]);
  });

  document.getElementById('cameraInput').addEventListener('change', function(e) {
    handleImageFile(e.target.files[0]);
  });

  async function scanImage() {
    if (!base64Image) return;
    
    const scanBtn = document.getElementById('scanBtn');
    const status = document.getElementById('status');
    
    scanBtn.disabled = true;
    status.textContent = '🔍 Analyzing image...';
    status.className = 'status loading';
    
    document.getElementById('detectedLabels').style.display = 'none';
    document.getElementById('resultsSection').style.display = 'none';

    try {
      const visionResponse = await fetch(
        'https://vision.googleapis.com/v1/images:annotate?key=' + VISION_API_KEY,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            requests: [{
              image: { content: base64Image },
              features: [
                { type: 'LABEL_DETECTION', maxResults: 15 },
                { type: 'TEXT_DETECTION', maxResults: 10 },
                { type: 'LOGO_DETECTION', maxResults: 5 },
                { type: 'WEB_DETECTION', maxResults: 10 },
                { type: 'CROP_HINTS' }
              ]
            }]
          })
        }
      );

      const visionData = await visionResponse.json();
      
      if (!visionData.responses || !visionData.responses[0]) {
        throw new Error('No response from Vision API');
      }

      const response = visionData.responses[0];
      const labels = (response.labelAnnotations || []).map(function(l) { return l.description.toLowerCase(); });
      const texts = (response.textAnnotations || []).map(function(t) { return t.description.toLowerCase(); });
      const logos = (response.logoAnnotations || []).map(function(l) { return l.description.toLowerCase(); });
      
      // Web Detection - most powerful for bobblehead identification
      const webDetection = response.webDetection || {};
      const webEntities = (webDetection.webEntities || []).map(function(e) { return (e.description || '').toLowerCase(); });
      const webLabels = (webDetection.bestGuessLabels || []).map(function(l) { return (l.label || '').toLowerCase(); });
      const webAll = webEntities.concat(webLabels);
      console.log('WEB DETECTED:', webAll);
      
      const blacklist = ['toy', 'figurine', 'collectable', 'collectible', 'product', 'plastic', 'statue', 'doll', 'action figure', 'material property', 'fictional character', 'art', 'font', 'games'];
      const allDetected = labels.concat(logos).concat(webAll).filter(function(v, i, a) { 
        return a.indexOf(v) === i && !blacklist.includes(v); 
      });
      const allText = texts.join(' ');
      
      const labelTags = document.getElementById('labelTags');
      const displayItems = allDetected.slice(0, 10);
      // Also show first detected text words
      const textWords = texts.length > 0 ? texts[0].split('\n').filter(function(w) { return w.length > 3; }).slice(0, 5) : [];
      const allDisplay = displayItems.concat(textWords.map(function(w) { return '📝 ' + w; }));
      labelTags.innerHTML = allDisplay.map(function(l) {
        return '<span class="label-tag">' + l + '</span>';
      }).join('');
      // detected labels hidden

      status.textContent = 'Searching database...';
      
      await searchDatabase(allDetected, allText, webAll);
      
    } catch(err) {
      status.textContent = 'Error: ' + err.message;
      status.className = 'status error';
      scanBtn.disabled = false;
    }
  }

  async function searchDatabase(labels, detectedText, webAll) {
    webAll = webAll || [];
    const status = document.getElementById('status');
    
    try {
      const sheetsUrl = 'https://docs.google.com/spreadsheets/d/' + SHEETS_ID + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(SHEET_NAME);
      const sheetsResponse = await fetch(sheetsUrl);
      const text = await sheetsResponse.text();
      const json = JSON.parse(text.substring(47).slice(0, -2));
      
      const headers = json.table.cols.map(function(c) { return c.label.toLowerCase(); });
      console.log('HEADERS:', headers);
      const rows = json.table.rows.map(function(row) {
        const obj = {};
        headers.forEach(function(h, i) {
          obj[h] = row.c[i] ? (row.c[i].v || '') : '';
        });
        return obj;
      });

      const scored = rows.map(function(row) {
        let score = 0;
        const teamName = (row['team'] || '').toLowerCase();
        const eventName = (row['item / event'] || '').toLowerCase();
        const themeName = (row['theme'] || '').toLowerCase();
        const affiliateName = (row['affiliate'] || '').toLowerCase();
        const rowText = [teamName, eventName, themeName, affiliateName].join(' ');

        // Web detection scoring - highest weight
        webAll.forEach(function(webTerm) {
          if (teamName.includes(webTerm) || webTerm.includes(teamName)) score += 40;
          if (eventName.includes(webTerm) || webTerm.includes(eventName.split(' ')[0])) score += 35;
          if (affiliateName.includes(webTerm) || webTerm.includes(affiliateName)) score += 25;
          if (themeName.includes(webTerm)) score += 20;
        });

        if (detectedText) {
          const words = detectedText.split(/\s+/).filter(function(w) { return w.length > 3; });
          words.forEach(function(word) {
            if (teamName.includes(word)) score += 30;
            if (eventName.includes(word)) score += 25;
            if (affiliateName.includes(word)) score += 20;
            if (themeName.includes(word)) score += 15;
          });
        }

        labels.forEach(function(label) {
          if (rowText.includes(label)) score += 2;
          if (label === 'baseball' && (teamName || affiliateName)) score += 3;
          if (label === 'basketball' && row['sport'] === 'Basketball') score += 3;
          if (label === 'hockey' && row['sport'] === 'Hockey') score += 3;
        });
        
        return Object.assign({}, row, { score: score });
      });

      const matches = scored
        .filter(function(r) { return r.score > 15; })
        .sort(function(a, b) { return b.score - a.score; })
        .slice(0, 5);

      displayResults(matches);
      
      status.textContent = matches.length > 0 
        ? 'Found ' + matches.length + ' match' + (matches.length > 1 ? 'es' : '') + '!'
        : 'No matches found — try a clearer photo';
      status.className = matches.length > 0 ? 'status success' : 'status';
      
    } catch(err) {
      status.textContent = 'Database error: ' + err.message;
      status.className = 'status error';
    }
    
    document.getElementById('scanBtn').disabled = false;
  }

  function formatDate(dateVal) {
    if (!dateVal) return '';
    // Handle Date(2017,2,3) format from Google Sheets
    var match = String(dateVal).match(/Date\((\d+),(\d+),(\d+)\)/);
    if (match) {
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return months[parseInt(match[2])] + ' ' + match[3] + ', ' + match[1];
    }
    return dateVal;
  }

  function openInApp(searchTerm) {
    // Open Glide app with search term pre-filled
    var appUrl = 'https://ad-count-7vfx.glide.page';
    window.open(appUrl, '_blank');
  }

  function displayResults(matches) {
    const resultsList = document.getElementById('resultsList');
    const resultsSection = document.getElementById('resultsSection');
    
    if (!matches.length) {
      resultsList.innerHTML = '<div class="no-results">No matching bobbleheads found.<br>Try a clearer photo or different angle.</div>';
      resultsSection.style.display = 'block';
      return;
    }

    resultsList.innerHTML = matches.map(function(m) {
      return '<div class="result-card">' +
        '<img src="' + (m['image_url'] || '') + '" onerror="this.style.display=\'none\'" alt="Bobblehead">' +
        '<div class="result-info">' +
        '<h4>' + (m['item / event'] || m['event'] || m['item/event'] || 'Unknown') + '</h4>' +
        '<p class="team">' + (m['team'] || '') + '</p>' +
        '<p>' + (m['affiliate'] || '') + (m['date'] ? ' • ' + formatDate(m['date']) : '') + '</p>' +
        '<p>' + (m['theme'] ? 'Theme: ' + m['theme'] : '') + '</p>' +
        '</div></div>';
    }).join('');
    
    resultsSection.style.display = 'block';
  }
</script>
</body>
</html>
